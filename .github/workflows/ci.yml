name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test (all modules)
        run: mvn -B verify -DskipITs

      - name: Build Lambda function.zips
        run: |
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests

      - name: Validate SAM template
        uses: aws-actions/setup-sam@v2
      - run: sam validate -t sam.yaml --lint

      - name: Build container images (JVM, no push)
        run: |
          mvn -B -pl eks-dx-auth-proxy package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=false
          mvn -B -pl eks-dx-pod-identity-webhook package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=false

      - name: Lint Helm charts
        run: |
          helm lint eks-dx-auth-proxy/target/helm/kubernetes/eks-dx-auth-proxy
          helm lint eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-dx-pod-identity-webhook

  integration-test:
    runs-on: ubuntu-24.04
    services:
      dynamodb-local:
        image: public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local:latest
        ports:
          - 18000:8000
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run DynamoDB integration tests
        run: |
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service test \
            -Dtest=DynamoDbIntegrationTest \
            -Dintegration.dynamodb=true \
            -Ddynamodb.endpoint=http://localhost:18000
