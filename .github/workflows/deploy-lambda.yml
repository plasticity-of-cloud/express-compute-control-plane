name: Deploy via CDK

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        default: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build Lambda function.zips
        run: |
          mvn -B -pl ecp-model,ecp-credential-service package -DskipTests
          mvn -B -pl ecp-model,ecp-mgmt-service package -DskipTests
          mvn -B -pl ecp-model,ecp-tenant-service package -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Deploy via CDK
        run: |
          cd infra
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          cdk deploy EcpStack --require-approval never \
            --context account=${ACCOUNT} \
            --context region=${{ inputs.region }}
