name: Deploy Lambda functions

on:
  workflow_dispatch:
    inputs:
      function:
        description: 'Which function to deploy (credential | mgmt | tenant | all)'
        required: true
        default: all
      region:
        description: AWS region
        required: true
        default: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Lambda function.zips
        run: |
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          # tenant service: GraalVM native image (provided.al2023, arm64)
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Deploy credential service
        if: inputs.function == 'credential' || inputs.function == 'all'
        run: |
          aws lambda update-function-code \
            --function-name eks-dx-credential-service \
            --zip-file fileb://eks-dx-credential-service/target/function.zip \
            --region ${{ inputs.region }}

      - name: Deploy mgmt service
        if: inputs.function == 'mgmt' || inputs.function == 'all'
        run: |
          aws lambda update-function-code \
            --function-name eks-dx-mgmt-service \
            --zip-file fileb://eks-dx-mgmt-service/target/function.zip \
            --region ${{ inputs.region }}

      - name: Deploy tenant service
        if: inputs.function == 'tenant' || inputs.function == 'all'
        run: |
          aws lambda update-function-code \
            --function-name eks-dx-tenant-service \
            --zip-file fileb://eks-dx-tenant-service/target/function.zip \
            --region ${{ inputs.region }}
