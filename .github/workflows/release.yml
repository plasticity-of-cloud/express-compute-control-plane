name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.3)'
        required: true

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '25'

jobs:
  # ── build ─────────────────────────────────────────────────────────────────
  # Runs on both arch runners. Each runner produces:
  #   - container images (proxy, webhook, karpenter-support) → arch-tagged push to GHCR
  #   - CLI native binary
  #   - tenant-service native zip (arm64 = production CDK artifact; amd64 = dev artifact)
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs
        env:
          AWS_REGION: us-east-1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for MODULE in ecp-auth-proxy ecp-workload-identity-webhook ecp-karpenter-support; do
            mvn -B -pl ${MODULE} package -DskipTests -Pnative \
              -Dquarkus.container-image.build=true \
              -Dquarkus.container-image.push=true \
              -Dquarkus.container-image.registry=ghcr.io \
              -Dquarkus.container-image.group=${{ github.repository_owner }} \
              -Dquarkus.container-image.tag=${VERSION}-${{ matrix.arch }}
          done

      - name: Build CLI native binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl ecp-cli package -Pnative -DskipTests
          cp ecp-cli/target/*-runner ecp-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Build tenant-service native zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl ecp-model,ecp-tenant-service package -DskipTests -Pnative
          cp ecp-tenant-service/target/function.zip ecp-tenant-service-${VERSION}-${{ matrix.arch }}.zip

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            ecp-cli-*-linux-${{ matrix.arch }}
            ecp-tenant-service-*-${{ matrix.arch }}.zip

  # ── build-jvm-based-lambdas ──────────────────────────────────────────────
  # JVM Lambda zips (credential + mgmt) + Helm charts
  build-jvm-based-lambdas:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JVM Lambda zips (credential + mgmt)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl ecp-model,ecp-credential-service package -DskipTests
          mvn -B -pl ecp-model,ecp-mgmt-service package -DskipTests
          cp ecp-credential-service/target/function.zip ecp-credential-service-${VERSION}.zip
          cp ecp-mgmt-service/target/function.zip ecp-mgmt-service-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm charts to GHCR (OCI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          for MODULE in ecp-auth-proxy ecp-workload-identity-webhook ecp-karpenter-support; do
            mvn -B -pl ${MODULE} package -DskipTests \
              -Dquarkus.helm.version=${VERSION} \
              -Dquarkus.container-image.build=false \
              -Dquarkus.container-image.registry=ghcr.io \
              -Dquarkus.container-image.group=${{ github.repository_owner }} \
              -Dquarkus.container-image.tag=${VERSION}
          done

          helm push ecp-auth-proxy/target/helm/kubernetes/express-compute-auth-proxy-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push ecp-workload-identity-webhook/target/helm/kubernetes/express-compute-workload-identity-webhook-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push ecp-karpenter-support/target/helm/kubernetes/express-compute-karpenter-support-${VERSION}.tar.gz oci://${REGISTRY}/helm

          cp ecp-auth-proxy/target/helm/kubernetes/express-compute-auth-proxy-${VERSION}.tar.gz express-compute-auth-proxy-${VERSION}.tar.gz
          cp ecp-workload-identity-webhook/target/helm/kubernetes/express-compute-workload-identity-webhook-${VERSION}.tar.gz express-compute-workload-identity-webhook-${VERSION}.tar.gz
          cp ecp-karpenter-support/target/helm/kubernetes/express-compute-karpenter-support-${VERSION}.tar.gz express-compute-karpenter-support-${VERSION}.tar.gz

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          retention-days: 1
          path: |
            ecp-credential-service-*.zip
            ecp-mgmt-service-*.zip
            express-compute-auth-proxy-*.tar.gz
            express-compute-workload-identity-webhook-*.tar.gz
            express-compute-karpenter-support-*.tar.gz

  # ── multiarch-manifest-build ─────────────────────────────────────────────
  multiarch-manifest-build:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=ghcr.io/${{ github.repository_owner }}
          for IMAGE in express-compute-auth-proxy express-compute-workload-identity-webhook express-compute-karpenter-support; do
            docker buildx imagetools create -t ${REPO}/${IMAGE}:${VERSION} \
              ${REPO}/${IMAGE}:${VERSION}-amd64 \
              ${REPO}/${IMAGE}:${VERSION}-arm64
          done

  # ── package-cdk ───────────────────────────────────────────────────────────
  # Pre-synthesizes the CDK stack so consumers only need `cdk deploy --app cdk.out`.
  # No Maven, no Java required at deploy time.
  package-cdk:
    needs: [build, build-jvm-based-lambdas]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Download arm64 build artifacts (contains tenant zip)
        uses: actions/download-artifact@v8
        with:
          name: release-arm64
          path: /tmp/release-arm64

      - name: Download package artifacts (credential + mgmt zips)
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: /tmp/release-packages

      - name: Pre-synthesize CDK stack
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Place Lambda zips where CDK expects them (assets/ mode)
          mkdir -p assets
          cp /tmp/release-arm64/ecp-tenant-service-${VERSION}-arm64.zip assets/tenant-service.zip
          cp /tmp/release-packages/ecp-credential-service-${VERSION}.zip assets/credential-service.zip
          cp /tmp/release-packages/ecp-mgmt-service-${VERSION}.zip assets/mgmt-service.zip

          # Compile CDK app and synthesize (assets are staged into cdk.out/)
          mvn -B -N install -DskipTests
          mvn -B -pl ecp-model install -DskipTests
          mvn -B -pl infra compile
          cd infra && cdk synth
        env:
          AWS_REGION: us-east-1

      - name: Bundle release tarball with cdk.out
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUNDLE="express-compute-control-plane-${VERSION}"
          mkdir -p "${BUNDLE}"

          # Pre-synthesized CDK output — deploy with `cdk deploy --app cdk.out`
          cp -r infra/cdk.out "${BUNDLE}/cdk.out"

          # Also include assets + source for users who want to customize
          cp -r assets "${BUNDLE}/assets"
          cp -r infra "${BUNDLE}/infra"

          printf '# EKS-DX Control Plane - CDK Deployment\n\n## Quick Deploy (no build required)\n\n    cd express-compute-control-plane-<version>\n    cdk deploy --app cdk.out ExpressComputeControlPlaneStack\n\nNo Java, no Maven needed - the stack is pre-synthesized.\n\n## Custom Deploy (with modifications)\n\n    cd infra\n    cdk deploy ExpressComputeControlPlaneStack --context jvmTenant=true\n\nPre-built Lambda zips are in assets/ - no need to rebuild Lambda code.\n' > "${BUNDLE}/README.md"

          tar czf "express-compute-control-plane-${VERSION}.tar.gz" "${BUNDLE}"

      - name: Upload CDK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-cdk
          retention-days: 1
          path: express-compute-control-plane-*.tar.gz

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: [build, multiarch-manifest-build, build-jvm-based-lambdas, package-cdk]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum * > checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            artifacts/checksums.sha256
