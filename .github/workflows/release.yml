name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '21'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            jib-platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            jib-platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs

      - name: Build Lambda function.zip
        run: mvn -B -pl eks-dx-lambda package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=ghcr.io/${{ github.repository_owner }}
          mvn -B -pl eks-dx-auth-proxy package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION} \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build and push webhook image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-pod-identity-webhook package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION} \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build CLI native binary (GraalVM)
        run: |
          mvn -B -pl eks-dx-cli package -Pnative -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-cli/target/*-runner eks-dx-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            eks-dx-cli-*-linux-${{ matrix.arch }}

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build Lambda function.zip
        run: |
          mvn -B -pl eks-dx-lambda package -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-lambda/target/function.zip eks-dx-lambda-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm charts to GHCR (OCI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          mvn -B -pl eks-dx-auth-proxy package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false
          mvn -B -pl eks-dx-pod-identity-webhook package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false

          helm push eks-dx-auth-proxy/target/helm/kubernetes/eks-dx-auth-proxy-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-dx-pod-identity-webhook-${VERSION}.tar.gz oci://${REGISTRY}/helm

          # Also keep tarballs as release assets for direct download
          cp eks-dx-auth-proxy/target/helm/kubernetes/eks-dx-auth-proxy-${VERSION}.tar.gz .
          cp eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-dx-pod-identity-webhook-${VERSION}.tar.gz .

      - name: Package SAM template
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf eks-dx-sam-${VERSION}.tar.gz sam.yaml

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          retention-days: 1
          path: |
            eks-dx-lambda-*.zip
            eks-dx-auth-proxy-*.tar.gz
            eks-dx-pod-identity-webhook-*.tar.gz
            eks-dx-sam-*.tar.gz

  release:
    needs: [build, package]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
