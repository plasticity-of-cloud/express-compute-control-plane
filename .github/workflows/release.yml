name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '25'

jobs:
  # ── build ─────────────────────────────────────────────────────────────────
  # Runs on both arch runners. Each runner produces:
  #   - container images (proxy, webhook, karpenter-support) → arch-tagged push to GHCR
  #   - CLI native binary
  #   - tenant-service native zip (arm64 = production CDK artifact; amd64 = dev artifact)
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            jib-platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            jib-platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs
        env:
          AWS_REGION: us-east-1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for MODULE in eks-dx-auth-proxy eks-dx-pod-identity-webhook; do
            mvn -B -pl ${MODULE} package -DskipTests \
              -Dquarkus.container-image.build=true \
              -Dquarkus.container-image.push=true \
              -Dquarkus.container-image.registry=ghcr.io \
              -Dquarkus.container-image.group=${{ github.repository_owner }} \
              -Dquarkus.container-image.tag=${VERSION}-${{ matrix.arch }} \
              -Dquarkus.jib.platforms=${{ matrix.jib-platform }}
          done
          # karpenter-support: native image
          mvn -B -pl eks-dx-karpenter-support package -DskipTests -Pnative \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION}-${{ matrix.arch }} \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build CLI native binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-cli package -Pnative -DskipTests
          cp eks-dx-cli/target/*-runner eks-dx-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Build tenant-service native zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests -Pnative
          cp eks-dx-tenant-service/target/function.zip eks-dx-tenant-service-${VERSION}-${{ matrix.arch }}.zip

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            eks-dx-cli-*-linux-${{ matrix.arch }}
            eks-dx-tenant-service-*-${{ matrix.arch }}.zip

  # ── build-jvm-based-lambdas ──────────────────────────────────────────────
  # JVM Lambda zips (credential + mgmt) + Helm charts
  build-jvm-based-lambdas:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JVM Lambda zips (credential + mgmt)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          cp eks-dx-credential-service/target/function.zip eks-dx-credential-service-${VERSION}.zip
          cp eks-dx-mgmt-service/target/function.zip eks-dx-mgmt-service-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm charts to GHCR (OCI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          for MODULE in eks-dx-auth-proxy eks-dx-pod-identity-webhook eks-dx-karpenter-support; do
            mvn -B -pl ${MODULE} package -DskipTests \
              -Dquarkus.helm.version=${VERSION} \
              -Dquarkus.container-image.build=false
          done

          helm push eks-dx-auth-proxy/target/helm/kubernetes/eks-d-xpress-auth-proxy-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-d-xpress-pod-identity-webhook-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-karpenter-support/target/helm/kubernetes/eks-dx-karpenter-support-${VERSION}.tar.gz oci://${REGISTRY}/helm

          cp eks-dx-auth-proxy/target/helm/kubernetes/eks-d-xpress-auth-proxy-${VERSION}.tar.gz eks-dx-auth-proxy-${VERSION}.tar.gz
          cp eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-d-xpress-pod-identity-webhook-${VERSION}.tar.gz eks-dx-pod-identity-webhook-${VERSION}.tar.gz
          cp eks-dx-karpenter-support/target/helm/kubernetes/eks-dx-karpenter-support-${VERSION}.tar.gz eks-dx-karpenter-support-${VERSION}.tar.gz

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          retention-days: 1
          path: |
            eks-dx-credential-service-*.zip
            eks-dx-mgmt-service-*.zip
            eks-dx-auth-proxy-*.tar.gz
            eks-dx-pod-identity-webhook-*.tar.gz
            eks-dx-karpenter-support-*.tar.gz

  # ── multiarch-manifest-build ─────────────────────────────────────────────
  multiarch-manifest-build:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=ghcr.io/${{ github.repository_owner }}
          for IMAGE in eks-d-xpress-auth-proxy eks-d-xpress-pod-identity-webhook eks-dx-karpenter-support; do
            docker buildx imagetools create -t ${REPO}/${IMAGE}:${VERSION} \
              ${REPO}/${IMAGE}:${VERSION}-amd64 \
              ${REPO}/${IMAGE}:${VERSION}-arm64
          done

  # ── package-cdk ───────────────────────────────────────────────────────────
  # CDK synth uses the arm64 tenant zip (production Lambda arch) from the build job.
  # JVM Lambda zips are taken from the package job artifacts.
  package-cdk:
    needs: [build, build-jvm-based-lambdas]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download arm64 build artifacts (contains tenant zip)
        uses: actions/download-artifact@v8
        with:
          name: release-arm64
          path: /tmp/release-arm64

      - name: Download package artifacts (credential + mgmt zips)
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: /tmp/release-packages

      - name: Stage Lambda zips for CDK asset lookup
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p eks-dx-tenant-service/target eks-dx-credential-service/target eks-dx-mgmt-service/target
          cp /tmp/release-arm64/eks-dx-tenant-service-${VERSION}-arm64.zip eks-dx-tenant-service/target/function.zip
          cp /tmp/release-packages/eks-dx-credential-service-${VERSION}.zip eks-dx-credential-service/target/function.zip
          cp /tmp/release-packages/eks-dx-mgmt-service-${VERSION}.zip eks-dx-mgmt-service/target/function.zip
          echo "Staged Lambda zips:"
          ls -lh eks-dx-*/target/function.zip

      - name: Install CDK CLI
        run: npm install -g aws-cdk --quiet

      - name: Synth CDK template
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd infra && cdk synth
          cd ..
          tar czf eks-dx-cdk-${VERSION}.tar.gz -C infra cdk.out

      - name: Upload CDK artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-cdk
          retention-days: 1
          path: eks-dx-cdk-*.tar.gz

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: [build, multiarch-manifest-build, build-jvm-based-lambdas, package-cdk]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum * > checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            artifacts/checksums.sha256
