name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.3)'
        required: true

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '25'

jobs:
  # ── build ─────────────────────────────────────────────────────────────────
  # Runs on both arch runners. Each runner produces:
  #   - container images (proxy, webhook, karpenter-support) → arch-tagged push to GHCR
  #   - CLI native binary
  #   - tenant-service native zip (arm64 = production CDK artifact; amd64 = dev artifact)
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs
        env:
          AWS_REGION: us-east-1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for MODULE in eks-dx-auth-proxy eks-dx-pod-identity-webhook; do
            mvn -B -pl ${MODULE} package -DskipTests \
              -Dquarkus.container-image.build=true \
              -Dquarkus.container-image.push=true \
              -Dquarkus.container-image.registry=ghcr.io \
              -Dquarkus.container-image.group=${{ github.repository_owner }} \
              -Dquarkus.container-image.tag=${VERSION}-${{ matrix.arch }}
          done
          # karpenter-support: native image
          mvn -B -pl eks-dx-karpenter-support package -DskipTests -Pnative \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION}-${{ matrix.arch }}

      - name: Build CLI native binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-cli package -Pnative -DskipTests
          cp eks-dx-cli/target/*-runner eks-dx-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Build tenant-service native zip
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests -Pnative
          cp eks-dx-tenant-service/target/function.zip eks-dx-tenant-service-${VERSION}-${{ matrix.arch }}.zip

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            eks-dx-cli-*-linux-${{ matrix.arch }}
            eks-dx-tenant-service-*-${{ matrix.arch }}.zip

  # ── build-jvm-based-lambdas ──────────────────────────────────────────────
  # JVM Lambda zips (credential + mgmt) + Helm charts
  build-jvm-based-lambdas:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JVM Lambda zips (credential + mgmt)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          cp eks-dx-credential-service/target/function.zip eks-dx-credential-service-${VERSION}.zip
          cp eks-dx-mgmt-service/target/function.zip eks-dx-mgmt-service-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm charts to GHCR (OCI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          for MODULE in eks-dx-auth-proxy eks-dx-pod-identity-webhook eks-dx-karpenter-support; do
            mvn -B -pl ${MODULE} package -DskipTests \
              -Dquarkus.helm.version=${VERSION} \
              -Dquarkus.container-image.build=false \
              -Dquarkus.container-image.registry=ghcr.io \
              -Dquarkus.container-image.group=${{ github.repository_owner }} \
              -Dquarkus.container-image.tag=${VERSION}
          done

          helm push eks-dx-auth-proxy/target/helm/kubernetes/eks-d-xpress-auth-proxy-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-d-xpress-pod-identity-webhook-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-karpenter-support/target/helm/kubernetes/eks-d-xpress-karpenter-support-${VERSION}.tar.gz oci://${REGISTRY}/helm

          cp eks-dx-auth-proxy/target/helm/kubernetes/eks-d-xpress-auth-proxy-${VERSION}.tar.gz eks-d-xpress-auth-proxy-${VERSION}.tar.gz
          cp eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-d-xpress-pod-identity-webhook-${VERSION}.tar.gz eks-d-xpress-pod-identity-webhook-${VERSION}.tar.gz
          cp eks-dx-karpenter-support/target/helm/kubernetes/eks-d-xpress-karpenter-support-${VERSION}.tar.gz eks-d-xpress-karpenter-support-${VERSION}.tar.gz

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages
          retention-days: 1
          path: |
            eks-dx-credential-service-*.zip
            eks-dx-mgmt-service-*.zip
            eks-d-xpress-auth-proxy-*.tar.gz
            eks-d-xpress-pod-identity-webhook-*.tar.gz
            eks-d-xpress-karpenter-support-*.tar.gz

  # ── multiarch-manifest-build ─────────────────────────────────────────────
  multiarch-manifest-build:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=ghcr.io/${{ github.repository_owner }}
          for IMAGE in eks-d-xpress-auth-proxy eks-d-xpress-pod-identity-webhook eks-d-xpress-karpenter-support; do
            docker buildx imagetools create -t ${REPO}/${IMAGE}:${VERSION} \
              ${REPO}/${IMAGE}:${VERSION}-amd64 \
              ${REPO}/${IMAGE}:${VERSION}-arm64
          done

  # ── package-cdk ───────────────────────────────────────────────────────────
  # Pre-synthesizes the CDK stack so consumers only need `cdk deploy --app cdk.out`.
  # No Maven, no Java required at deploy time.
  package-cdk:
    needs: [build, build-jvm-based-lambdas]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Download arm64 build artifacts (contains tenant zip)
        uses: actions/download-artifact@v4
        with:
          name: release-arm64
          path: /tmp/release-arm64

      - name: Download package artifacts (credential + mgmt zips)
        uses: actions/download-artifact@v4
        with:
          name: release-packages
          path: /tmp/release-packages

      - name: Pre-synthesize CDK stack
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          # Place Lambda zips where CDK expects them (assets/ mode)
          mkdir -p assets
          cp /tmp/release-arm64/eks-dx-tenant-service-${VERSION}-arm64.zip assets/tenant-service.zip
          cp /tmp/release-packages/eks-dx-credential-service-${VERSION}.zip assets/credential-service.zip
          cp /tmp/release-packages/eks-dx-mgmt-service-${VERSION}.zip assets/mgmt-service.zip

          # Compile CDK app and synthesize (assets are staged into cdk.out/)
          mvn -B -N install -DskipTests
          mvn -B -pl eks-dx-model install -DskipTests
          mvn -B -pl infra compile
          cd infra && cdk synth
        env:
          AWS_REGION: us-east-1

      - name: Bundle release tarball with cdk.out
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUNDLE="eks-d-xpress-control-plane-${VERSION}"
          mkdir -p "${BUNDLE}"

          # Pre-synthesized CDK output — deploy with `cdk deploy --app cdk.out`
          cp -r infra/cdk.out "${BUNDLE}/cdk.out"

          # Also include assets + source for users who want to customize
          cp -r assets "${BUNDLE}/assets"
          cp -r infra "${BUNDLE}/infra"

          cat > "${BUNDLE}/README.md" <<'EOF'
# EKS-DX Control Plane — CDK Deployment

## Quick Deploy (no build required)

```bash
cd eks-d-xpress-control-plane-<version>
cdk deploy --app cdk.out EksDXpressControlPlaneStack
```

No Java, no Maven needed — the stack is pre-synthesized.

## Custom Deploy (with modifications)

If you need to change CDK context flags or modify the stack:

```bash
# Requires: Java 25, Maven 3.9+, CDK CLI
cd infra
cdk deploy EksDXpressControlPlaneStack --context jvmTenant=true
```

Pre-built Lambda zips are in `assets/` — no need to rebuild Lambda code.
EOF

          tar czf "eks-d-xpress-control-plane-${VERSION}.tar.gz" "${BUNDLE}"

      - name: Upload CDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-cdk
          retention-days: 1
          path: eks-d-xpress-control-plane-*.tar.gz

  # ── release ───────────────────────────────────────────────────────────────
  release:
    needs: [build, multiarch-manifest-build, build-jvm-based-lambdas, package-cdk]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum * > checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            artifacts/checksums.sha256
