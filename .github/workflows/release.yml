name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '25'

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            jib-platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            jib-platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build and test
        run: mvn -B verify -DskipITs

      - name: Build Lambda function.zips
        run: |
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests -Pnative

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push proxy image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=ghcr.io/${{ github.repository_owner }}
          mvn -B -pl eks-dx-auth-proxy package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION} \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build and push webhook image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl eks-dx-pod-identity-webhook package -DskipTests \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.registry=ghcr.io \
            -Dquarkus.container-image.group=${{ github.repository_owner }} \
            -Dquarkus.container-image.tag=${VERSION} \
            -Dquarkus.jib.platforms=${{ matrix.jib-platform }}

      - name: Build CLI native binary (GraalVM)
        run: |
          mvn -B -pl eks-dx-cli package -Pnative -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-cli/target/*-runner eks-dx-cli-${VERSION}-linux-${{ matrix.arch }}
        env:
          MAVEN_OPTS: '-Xmx10g'

      - name: Upload arch artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          retention-days: 1
          path: |
            eks-dx-cli-*-linux-${{ matrix.arch }}

  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build JVM Lambda function.zips (credential + mgmt)
        run: |
          mvn -B -pl eks-dx-model,eks-dx-credential-service package -DskipTests
          mvn -B -pl eks-dx-model,eks-dx-mgmt-service package -DskipTests
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-credential-service/target/function.zip eks-dx-credential-service-${VERSION}.zip
          cp eks-dx-mgmt-service/target/function.zip eks-dx-mgmt-service-${VERSION}.zip

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Helm charts to GHCR (OCI)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          mvn -B -pl eks-dx-auth-proxy package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false
          mvn -B -pl eks-dx-pod-identity-webhook package -DskipTests \
            -Dquarkus.helm.version=${VERSION} \
            -Dquarkus.container-image.build=false

          helm push eks-dx-auth-proxy/target/helm/kubernetes/eks-dx-auth-proxy-${VERSION}.tar.gz oci://${REGISTRY}/helm
          helm push eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-dx-pod-identity-webhook-${VERSION}.tar.gz oci://${REGISTRY}/helm

          # Also keep tarballs as release assets for direct download
          cp eks-dx-auth-proxy/target/helm/kubernetes/eks-dx-auth-proxy-${VERSION}.tar.gz .
          cp eks-dx-pod-identity-webhook/target/helm/kubernetes/eks-dx-pod-identity-webhook-${VERSION}.tar.gz .

      - name: Synth and package CDK template
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn -B -pl infra compile exec:java
          tar czf eks-dx-cdk-${VERSION}.tar.gz -C infra cdk.out

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          retention-days: 1
          path: |
            eks-dx-credential-service-*.zip
            eks-dx-mgmt-service-*.zip
            eks-dx-auth-proxy-*.tar.gz
            eks-dx-pod-identity-webhook-*.tar.gz
            eks-dx-cdk-*.tar.gz

  # Tenant service: GraalVM native image must be built on arm64 runner
  package-tenant-native:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build tenant service native (arm64)
        run: |
          mvn -B -pl eks-dx-model,eks-dx-tenant-service package -DskipTests -Pnative
          VERSION=${GITHUB_REF_NAME#v}
          cp eks-dx-tenant-service/target/function.zip eks-dx-tenant-service-${VERSION}.zip

      - name: Upload tenant artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-tenant
          retention-days: 1
          path: eks-dx-tenant-service-*.zip

  release:
    needs: [build, package, package-tenant-native]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
