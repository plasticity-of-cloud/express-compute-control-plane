{{- if .Values.webhook.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-selfsigned
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: {{ .Release.Namespace }}
spec:
  isCA: true
  commonName: eks-pod-identity-webhook-ca
  secretName: eks-pod-identity-webhook-ca
  issuerRef:
    name: eks-pod-identity-webhook-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: {{ .Release.Namespace }}
spec:
  ca:
    secretName: eks-pod-identity-webhook-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: eks-pod-identity-webhook-tls
  issuerRef:
    name: eks-pod-identity-webhook-ca
    kind: Issuer
  dnsNames:
  - eks-pod-identity-webhook.{{ .Release.Namespace }}.svc
  - eks-pod-identity-webhook.{{ .Release.Namespace }}.svc.cluster.local
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eks-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-pod-identity-webhook
rules:
- apiGroups: ["eks.plasticity.cloud"]
  resources: ["podidentityassociations"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-pod-identity-webhook
subjects:
- kind: ServiceAccount
  name: eks-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: eks-pod-identity-webhook
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.webhook.replicas }}
  selector:
    matchLabels:
      app: eks-pod-identity-webhook
  template:
    metadata:
      labels:
        app: eks-pod-identity-webhook
    spec:
      serviceAccountName: eks-pod-identity-webhook
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: eks-pod-identity-webhook
        image: {{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag }}
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: http
        env:
        - name: EKS_CLUSTER_NAME
          value: {{ .Values.clusterName | quote }}
        volumeMounts:
        - name: tls-certs
          mountPath: /tls
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
        resources:
          {{- toYaml .Values.webhook.resources | nindent 10 }}
      volumes:
      - name: tls-certs
        secret:
          secretName: eks-pod-identity-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: eks-pod-identity-webhook
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: eks-pod-identity-webhook
  ports:
  - name: https
    port: 8443
    targetPort: 8443
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: eks-pod-identity-webhook
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/eks-pod-identity-webhook-cert
webhooks:
- name: pod-identity.plasticity.cloud
  rules:
  - apiGroups: [""]
    apiVersions: ["v1"]
    operations: ["CREATE"]
    resources: ["pods"]
    scope: Namespaced
  clientConfig:
    service:
      namespace: {{ .Release.Namespace }}
      name: eks-pod-identity-webhook
      path: /mutate
      port: 8443
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5
  failurePolicy: Ignore
{{- end }}
