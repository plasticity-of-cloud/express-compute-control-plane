apiVersion: v1
kind: ServiceAccount
metadata:
  name: eks-auth-proxy
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-auth-proxy
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["eks.plasticity.cloud"]
  resources: ["podidentityassociations"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-auth-proxy
subjects:
- kind: ServiceAccount
  name: eks-auth-proxy
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: eks-auth-proxy
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-auth-proxy
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.proxy.replicas }}
  selector:
    matchLabels:
      app: eks-auth-proxy
  template:
    metadata:
      labels:
        app: eks-auth-proxy
    spec:
      serviceAccountName: eks-auth-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: eks-auth-proxy
        image: {{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag }}
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: http
        env:
        - name: AWS_REGION
          value: {{ .Values.aws.region | quote }}
        {{- if .Values.aws.credentialsSecret }}
        - name: AWS_ACCOUNT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.aws.credentialsSecret }}
              key: account-id
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.aws.credentialsSecret }}
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.aws.credentialsSecret }}
              key: secret-access-key
        {{- end }}
        volumeMounts:
        - name: tls-certs
          mountPath: /tls
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
        resources:
          {{- toYaml .Values.proxy.resources | nindent 10 }}
      volumes:
      - name: tls-certs
        secret:
          secretName: eks-auth-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: eks-auth-proxy
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: eks-auth-proxy
  ports:
  - name: https
    port: 443
    targetPort: 8443
  - name: http
    port: 8080
    targetPort: 8080
