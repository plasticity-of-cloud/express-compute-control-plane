---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eks-dx-auth-proxy
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-dx-auth-proxy
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
- apiGroups: ["eks.plasticity.cloud"]
  resources: ["podidentityassociations"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-dx-auth-proxy
subjects:
- kind: ServiceAccount
  name: eks-dx-auth-proxy
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: eks-dx-auth-proxy
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-dx-auth-proxy
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eks-dx-auth-proxy
  template:
    metadata:
      labels:
        app: eks-dx-auth-proxy
    spec:
      serviceAccountName: eks-dx-auth-proxy
      imagePullSecrets:
      - name: ecr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: eks-dx-auth-proxy
        image: 864899852480.dkr.ecr.us-east-1.amazonaws.com/plcloud/eks-dx-auth-proxy:1.0.0
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: http
        env:
        - name: AWS_REGION
          value: "us-east-1"
        - name: EKS_DX_ENDPOINT
          value: "https://iygc4hvpr2.execute-api.us-east-1.amazonaws.com/prod"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: eks-dx-auth-proxy-aws-creds
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: eks-dx-auth-proxy-aws-creds
              key: secret-access-key
        volumeMounts:
        - name: tls-certs
          mountPath: /tls
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: tls-certs
        secret:
          secretName: eks-dx-auth-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: eks-dx-auth-proxy
  namespace: kube-system
spec:
  selector:
    app: eks-dx-auth-proxy
  ports:
  - name: https
    port: 443
    targetPort: 8443
  - name: http
    port: 8080
    targetPort: 8080
