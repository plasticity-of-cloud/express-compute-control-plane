# Application configuration
quarkus.application.name=aws-eks-auth-service-proxy
quarkus.application.version=1.0.0

# HTTP configuration
quarkus.http.port=8080
quarkus.http.ssl-port=8443
quarkus.http.host=0.0.0.0

# TLS - cert-manager injects these via volume mount
quarkus.http.ssl.certificate.files=/tls/tls.crt
quarkus.http.ssl.certificate.key-files=/tls/tls.key
quarkus.http.insecure-requests=enabled

# Dev/test: plain HTTP only
%dev.quarkus.http.ssl.certificate.files=
%dev.quarkus.http.ssl.certificate.key-files=
%test.quarkus.http.ssl.certificate.files=
%test.quarkus.http.ssl.certificate.key-files=

# Performance optimizations
quarkus.http.io-threads=4
quarkus.http.worker-threads=20
quarkus.vertx.max-event-loop-execute-time=10s

# Native build configuration
quarkus.native.container-build=true
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-graalvmce-builder-image:jdk-21
quarkus.jib.base-native-image=quay.io/quarkus/quarkus-distroless-image:2.0

# Jib container image configuration
quarkus.container-image.build=true
quarkus.jib.jvm-arguments=-Xmx8g
quarkus.jib.platforms=linux/amd64

# Health checks
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging optimizations
quarkus.log.level=INFO
quarkus.log.category."cloud.plasticity".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.async=true

# EKS Pod Identity configuration
# Associations are stored as PodIdentityAssociation CRDs (eks.plasticity.cloud/v1).
# Manage them with the eks-d-auth-cli tool.

# AWS STS configuration
aws.sts.session-duration=PT1H

# Kubernetes client configuration
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.connection-timeout=10s
quarkus.kubernetes-client.request-timeout=30s

# Token validation uses Kubernetes TokenReview API (via Fabric8 client),
# not MicroProfile JWT / OIDC. No OIDC provider setup required.

# Kubernetes manifest generation
quarkus.kubernetes.namespace=kube-system
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.replicas=1
quarkus.kubernetes.ports."http".container-port=8080
quarkus.kubernetes.ports."https".container-port=8443
# TLS cert volume from cert-manager Secret
quarkus.kubernetes.secret-volumes."tls-certs".secret-name=eks-auth-proxy-tls
quarkus.kubernetes.mounts."tls-certs".path=/tls
quarkus.kubernetes.mounts."tls-certs".read-only=true
quarkus.kubernetes.liveness-probe.http-action-path=/health/live
quarkus.kubernetes.readiness-probe.http-action-path=/health/ready
quarkus.kubernetes.env.secrets=aws-credentials
quarkus.kubernetes.service-account=eks-auth-proxy

# Resource limits for Kubernetes
quarkus.kubernetes.resources.requests.memory=256Mi
quarkus.kubernetes.resources.requests.cpu=100m
quarkus.kubernetes.resources.limits.memory=512Mi
quarkus.kubernetes.resources.limits.cpu=500m

# Helm chart generation (quarkus-helm)
quarkus.helm.name=eks-auth-proxy
quarkus.helm.description=EKS Pod Identity authentication proxy for k3s / EKS-D clusters
quarkus.helm.create-tar-file=true
