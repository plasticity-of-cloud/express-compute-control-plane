# Application configuration
quarkus.application.name=eks-dx-auth-proxy
quarkus.application.version=1.0.0

# HTTP configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# TLS - cert-manager injects these via volume mount
quarkus.http.ssl-port=8443
quarkus.http.ssl.certificate.files=/tls/tls.crt
quarkus.http.ssl.certificate.key-files=/tls/tls.key
quarkus.http.insecure-requests=enabled

# Dev/test: plain HTTP only
%dev.quarkus.http.ssl.certificate.files=
%dev.quarkus.http.ssl.certificate.key-files=
%test.quarkus.http.ssl.certificate.files=
%test.quarkus.http.ssl.certificate.key-files=

# EKS-DX Lambda endpoint (required)
eks-dx.endpoint=${EKS_DX_ENDPOINT:https://eks-dx.plasticity.cloud}

# Health checks
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# Logging
quarkus.log.level=INFO
quarkus.log.category."cloud.plasticity".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Kubernetes client configuration
quarkus.kubernetes-client.trust-certs=true
quarkus.kubernetes-client.connection-timeout=10s
quarkus.kubernetes-client.request-timeout=30s

# Kubernetes manifest generation
quarkus.kubernetes.namespace=kube-system
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.replicas=1
quarkus.kubernetes.ports."http".container-port=8080
quarkus.kubernetes.ports."https".container-port=8443
quarkus.kubernetes.secret-volumes."tls-certs".secret-name=eks-dx-auth-proxy-tls
quarkus.kubernetes.mounts."tls-certs".path=/tls
quarkus.kubernetes.mounts."tls-certs".read-only=true
quarkus.kubernetes.liveness-probe.http-action-path=/health/live
quarkus.kubernetes.liveness-probe.initial-delay=30s
quarkus.kubernetes.readiness-probe.http-action-path=/health/ready
quarkus.kubernetes.readiness-probe.initial-delay=30s
quarkus.kubernetes.service-account=eks-dx-auth-proxy
quarkus.kubernetes.resources.requests.memory=128Mi
quarkus.kubernetes.resources.requests.cpu=50m
quarkus.kubernetes.resources.limits.memory=256Mi
quarkus.kubernetes.resources.limits.cpu=250m
quarkus.kubernetes.env.vars.EKS_DX_ENDPOINT=https://eks-dx.plasticity.cloud
quarkus.kubernetes.env.vars.AWS_REGION=us-east-1

# Helm chart generation
quarkus.helm.name=eks-dx-auth-proxy
quarkus.helm.description=EKS Pod Identity proxy — TokenReview + Lambda forwarding
quarkus.helm.create-tar-file=true
# image.registry/repository/tag defined in src/main/helm/values.yaml (merged at build time)
# deployment template uses: {{ .Values.app.image.registry }}/{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}
quarkus.helm.expressions.0.path=(kind == Deployment).spec.template.spec.containers[0].image
quarkus.helm.expressions.0.expression={{ .Values.app.imageConfig.registry }}/{{ .Values.app.imageConfig.repository }}:{{ .Values.app.imageConfig.tag }}

# Container image
quarkus.container-image.registry=864899852480.dkr.ecr.us-east-1.amazonaws.com
quarkus.container-image.group=plcloud
quarkus.container-image.name=eks-dx-auth-proxy
quarkus.container-image.tag=1.0.0
quarkus.container-image.build=true
quarkus.jib.platforms=linux/arm64
