AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EKS-DX Service — Pod Identity for k3s, microk8s, and EKS-D clusters

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    SnapStart:
      ApplyOn: PublishedVersions

Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (e.g., eks-dx.plasticity.cloud). Leave empty to skip.
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for the custom domain. Required if DomainName is set.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # --- API Gateway ---
  EksDxApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        DefaultAuthorizer: NONE
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","status":"$context.status","latency":"$context.responseLatency"}'

  # --- Custom Domain ---
  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasCustomDomain
    DependsOn: EksDxApi
    Properties:
      ApiId: !Ref EksDxApi
      DomainName: !Ref DomainName
      Stage: $default

  # --- Lambda Function ---
  EksDxFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
      Runtime: java21
      CodeUri: eks-dx-lambda/target/function.zip
      AutoPublishAlias: live
      Environment:
        Variables:
          EKS_DX_CLUSTERS_TABLE: !Ref ClustersTable
          EKS_DX_ASSOCIATIONS_TABLE: !Ref AssociationsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClustersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AssociationsTable
        - Statement:
            Effect: Allow
            Action: [sts:AssumeRole, sts:TagSession]
            Resource: "arn:aws:iam::*:role/eks-dx-pod-*"
      Events:
        # Credential exchange — open (token-authenticated)
        Assets:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters/{clusterName}/assets
            Method: POST
        # Management endpoints — IAM-authenticated
        ClustersPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters
            Method: POST
            Auth:
              Authorizer: AWS_IAM
        ClustersGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters
            Method: GET
            Auth:
              Authorizer: AWS_IAM
        ClusterByName:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters/{name}
            Method: ANY
            Auth:
              Authorizer: AWS_IAM
        ClusterJwks:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters/{name}/jwks
            Method: PUT
            Auth:
              Authorizer: AWS_IAM
        AssociationsAny:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations
            Method: ANY
        AssociationById:
          Type: HttpApi
          Properties:
            ApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations/{id}
            Method: ANY

  # --- DynamoDB Tables ---
  ClustersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-clusters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: clusterName, AttributeType: S }
      KeySchema:
        - { AttributeName: clusterName, KeyType: HASH }

  AssociationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-associations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  # --- CloudWatch Alarms ---
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-errors
      AlarmDescription: EKS-DX Lambda function errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-throttles
      AlarmDescription: EKS-DX Lambda function throttles
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-lambda-p99-duration
      AlarmDescription: EKS-DX Lambda p99 duration > 5s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  DynamoDbThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-dynamodb-throttles
      AlarmDescription: DynamoDB read/write throttling
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref ClustersTable
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # --- CloudWatch Logs ---
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/eks-dx
      RetentionInDays: 30

Outputs:
  Endpoint:
    Description: EKS-DX API endpoint
    Value: !Sub "https://${EksDxApi}.execute-api.${AWS::Region}.amazonaws.com"
  CustomEndpoint:
    Condition: HasCustomDomain
    Description: Custom domain endpoint
    Value: !Sub "https://${DomainName}"
  ClustersTableName:
    Value: !Ref ClustersTable
  AssociationsTableName:
    Value: !Ref AssociationsTable
