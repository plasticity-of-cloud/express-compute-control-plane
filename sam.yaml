AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EKS-DX Service — Pod Identity for k3s, microk8s, and EKS-D clusters

Globals:
  Function:
    Runtime: java21
    Environment:
      Variables:
        EKS_DX_CLUSTERS_TABLE: !Ref ClustersTable
        EKS_DX_ASSOCIATIONS_TABLE: !Ref AssociationsTable

Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: Custom domain name (leave empty to skip)
  CertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN for custom domain

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  # ---------------------------------------------------------------------------
  # REST API (single API Gateway, IAM auth default)
  # ---------------------------------------------------------------------------
  EksDxApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        DefaultAuthorizer: AWS_IAM
      AccessLogSetting:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          LoggingLevel: INFO

  ApiDomainName:
    Type: AWS::ApiGateway::DomainName
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      RegionalCertificateArn: !Ref CertificateArn
      EndpointConfiguration:
        Types: [REGIONAL]

  ApiMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasCustomDomain
    DependsOn: EksDxApiprodStage
    Properties:
      DomainName: !Ref DomainName
      RestApiId: !Ref EksDxApi
      Stage: prod

  # ---------------------------------------------------------------------------
  # eks-dx-credential-service  (hot path — SnapStart, dedicated warm pool)
  # ---------------------------------------------------------------------------
  EksDxCredentialFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
      CodeUri: eks-dx-credential-service/target/function.zip
      MemorySize: 512
      Timeout: 30
      AutoPublishAlias: live
      SnapStart:
        ApplyOn: PublishedVersions
      Policies:
        - Statement:
            Effect: Allow
            Action: [dynamodb:GetItem]
            Resource:
              - !GetAtt ClustersTable.Arn
              - !GetAtt AssociationsTable.Arn
        - Statement:
            Effect: Allow
            Action: [sts:AssumeRole, sts:TagSession]
            Resource: "arn:aws:iam::*:role/eks-dx-pod-*"
      Events:
        Assets:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/assets
            Method: POST
            Auth:
              Authorizer: NONE

  # ---------------------------------------------------------------------------
  # eks-dx-mgmt-service  (low traffic — no SnapStart needed)
  # ---------------------------------------------------------------------------
  EksDxMgmtFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
      CodeUri: eks-dx-mgmt-service/target/function.zip
      MemorySize: 256
      Timeout: 30
      Environment:
        Variables:
          EKS_DX_CLUSTERS_TABLE: !Ref ClustersTable
          EKS_DX_ASSOCIATIONS_TABLE: !Ref AssociationsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ClustersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AssociationsTable
        - Statement:
            Effect: Allow
            Action: iam:GetRole
            Resource: "arn:aws:iam::*:role/*"
      Events:
        ClustersPost:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters
            Method: POST
        ClustersGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters
            Method: GET
        ClusterGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}
            Method: GET
        ClusterDelete:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}
            Method: DELETE
        ClusterJwks:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/jwks
            Method: PUT
        AssociationsGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations
            Method: GET
            Auth:
              Authorizer: NONE
        AssociationsPost:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations
            Method: POST
        AssociationGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        AssociationDelete:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /clusters/{name}/pod-identity-associations/{id}
            Method: DELETE

  # ---------------------------------------------------------------------------
  # eks-dx-tenant-service  (async provisioning + SSE stream via Function URL)
  # ---------------------------------------------------------------------------
  EksDxTenantFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler::handleRequest
      CodeUri: eks-dx-tenant-service/target/function.zip
      Runtime: provided.al2023   # GraalVM native image
      Architectures: [arm64]     # graviton2 — cheaper + faster cold start for native
      MemorySize: 128
      Timeout: 900   # 15 min — covers SSE stream worst-case provisioning time
      FunctionUrlConfig:
        AuthType: AWS_IAM
        InvokeMode: RESPONSE_STREAM   # required for SSE /stream endpoint
      Environment:
        Variables:
          EKS_DX_TENANTS_TABLE: !Ref TenantsTable
          EKS_DX_CLUSTERS_TABLE: !Ref ClustersTable
          EKS_DX_LAUNCH_TEMPLATE_ID: !Ref LaunchTemplateId
          EKS_DX_SUBNET_ID: !Ref SubnetId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantsTable
        - Statement:
            Effect: Allow
            Action: [dynamodb:DeleteItem]
            Resource: !GetAtt ClustersTable.Arn
        - Statement:
            Effect: Allow
            Action:
              - ec2:RunInstances
              - ec2:TerminateInstances
              - ec2:CreateKeyPair
              - ec2:DeleteKeyPair
              - ec2:DescribeInstances
              - ec2:CreateTags
            Resource: "*"
        - Statement:
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:DeleteRole
              - iam:PutRolePolicy
              - iam:DeleteRolePolicy
              - iam:PassRole
            Resource: "arn:aws:iam::*:role/eks-dx-tenant-*"
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:CreateSecret
              - secretsmanager:DeleteSecret
              - secretsmanager:GetSecretValue
            Resource: "arn:aws:secretsmanager:*:*:secret:eks-dx/tenant/*"
        - Statement:
            Effect: Allow
            Action: sts:GetCallerIdentity
            Resource: "*"
      Events:
        TenantsPost:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /tenants
            Method: POST
        TenantGet:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /tenants/{id}
            Method: GET
        TenantDelete:
          Type: Api
          Properties:
            RestApiId: !Ref EksDxApi
            Path: /tenants/{id}
            Method: DELETE
        # /tenants/{id}/stream is served via Function URL — NOT API Gateway

  # ---------------------------------------------------------------------------
  # Parameters for tenant infrastructure (set up once via Terraform)
  # ---------------------------------------------------------------------------
  LaunchTemplateId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /eks-dx/tenant/launch-template-id
      Type: String
      Value: "lt-placeholder"   # override after Terraform creates the Launch Template

  SubnetId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /eks-dx/tenant/subnet-id
      Type: String
      Value: "subnet-placeholder"   # override with actual subnet

  # ---------------------------------------------------------------------------
  # DynamoDB Tables
  # ---------------------------------------------------------------------------
  ClustersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-clusters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: clusterName, AttributeType: S }
      KeySchema:
        - { AttributeName: clusterName, KeyType: HASH }

  AssociationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-associations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  TenantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: eks-dx-tenants
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: tenantId, AttributeType: S }
      KeySchema:
        - { AttributeName: tenantId, KeyType: HASH }

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms
  # ---------------------------------------------------------------------------
  CredentialErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-credential-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxCredentialFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  CredentialDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-credential-p99-duration
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxCredentialFunction
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  MgmtErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: eks-dx-mgmt-errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EksDxMgmtFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ---------------------------------------------------------------------------
  # CloudWatch Logs
  # ---------------------------------------------------------------------------
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/eks-dx
      RetentionInDays: 30

Outputs:
  Endpoint:
    Description: EKS-DX API endpoint
    Value: !Sub "https://${EksDxApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  CustomEndpoint:
    Condition: HasCustomDomain
    Description: Custom domain endpoint
    Value: !Sub "https://${DomainName}"
  TenantStreamFunctionUrl:
    Description: Lambda Function URL for SSE tenant progress stream
    Value: !GetAtt EksDxTenantFunctionUrl.FunctionUrl
  ClustersTableName:
    Value: !Ref ClustersTable
  AssociationsTableName:
    Value: !Ref AssociationsTable
  TenantsTableName:
    Value: !Ref TenantsTable
  CredentialFunctionName:
    Value: !Ref EksDxCredentialFunction
  MgmtFunctionName:
    Value: !Ref EksDxMgmtFunction
  TenantFunctionName:
    Value: !Ref EksDxTenantFunction
  EksDxCliPolicyResource:
    Description: IAM resource ARN for CLI execute-api:Invoke policy
    Value: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${EksDxApi}/prod/*/*"
