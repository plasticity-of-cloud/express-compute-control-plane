# HTTP server port — Lambda Web Adapter connects here
quarkus.http.port=${PORT:8080}

eks-d-xpress.tenants-table=${EKS_DX_TENANTS_TABLE:eks-d-xpress-tenants}
eks-d-xpress.clusters-table=${EKS_DX_CLUSTERS_TABLE:eks-d-xpress-clusters}
eks-d-xpress.tenant.lt-arm64-ondemand=${EKS_DX_LT_ARM64_ONDEMAND}
eks-d-xpress.tenant.lt-arm64-spot=${EKS_DX_LT_ARM64_SPOT}
eks-d-xpress.tenant.lt-x86-ondemand=${EKS_DX_LT_X86_ONDEMAND}
eks-d-xpress.tenant.lt-x86-spot=${EKS_DX_LT_X86_SPOT}
eks-d-xpress.tenant.vpc-id=${EKS_DX_VPC_ID}
eks-d-xpress.tenant.availability-zone=${EKS_DX_AVAILABILITY_ZONE:auto}

# KMS asymmetric key for signing tenant CA certificates
eks-d-xpress.crypto.kms-ca-key-id=${EKS_DX_KMS_CA_KEY_ID:}

quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG

# Dry-run mode: simulate provisioning SSE stream without creating resources
# Set EKS_DX_DRY_RUN=true to enable
eks-dx.dry-run=${EKS_DX_DRY_RUN:false}

# Deployment mode: self-managed | managed | hybrid (default)
eks-dx.deployment-mode=${EKS_DX_DEPLOYMENT_MODE:hybrid}

# Package as uber-jar for Lambda Web Adapter deployment
quarkus.package.jar.type=uber-jar

# Quota — read from SSM at deploy via CDK, passed as env var
eks-dx.quota.max-tenants-per-caller=${EKS_DX_MAX_TENANTS_PER_CALLER:1}
