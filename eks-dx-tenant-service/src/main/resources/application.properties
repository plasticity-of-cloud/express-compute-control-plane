quarkus.lambda.handler=rest-handler
quarkus.http.port=8080

eks-dx.tenants-table=${EKS_DX_TENANTS_TABLE:eks-dx-tenants}
eks-dx.clusters-table=${EKS_DX_CLUSTERS_TABLE:eks-dx-clusters}
eks-dx.tenant.lt-arm64-ondemand=${EKS_DX_LT_ARM64_ONDEMAND}
eks-dx.tenant.lt-arm64-spot=${EKS_DX_LT_ARM64_SPOT}
eks-dx.tenant.lt-x86-ondemand=${EKS_DX_LT_X86_ONDEMAND}
eks-dx.tenant.lt-x86-spot=${EKS_DX_LT_X86_SPOT}
eks-dx.tenant.subnet-ids=${EKS_DX_SUBNET_IDS}
eks-dx.tenant.vpc-id=${EKS_DX_VPC_ID}
eks-dx.tenant.availability-zone=${EKS_DX_AVAILABILITY_ZONE:}

# Lambda Function URL timeout for SSE stream (15 min)
quarkus.lambda.timeout=900

quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG
