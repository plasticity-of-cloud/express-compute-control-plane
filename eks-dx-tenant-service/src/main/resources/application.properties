quarkus.lambda.handler=rest-handler
quarkus.http.port=8080

eks-d-xpress.tenants-table=${EKS_DX_TENANTS_TABLE:eks-d-xpress-tenants}
eks-d-xpress.clusters-table=${EKS_DX_CLUSTERS_TABLE:eks-d-xpress-clusters}
eks-d-xpress.tenant.lt-arm64-ondemand=${EKS_DX_LT_ARM64_ONDEMAND}
eks-d-xpress.tenant.lt-arm64-spot=${EKS_DX_LT_ARM64_SPOT}
eks-d-xpress.tenant.lt-x86-ondemand=${EKS_DX_LT_X86_ONDEMAND}
eks-d-xpress.tenant.lt-x86-spot=${EKS_DX_LT_X86_SPOT}
eks-d-xpress.tenant.vpc-id=${EKS_DX_VPC_ID}
eks-d-xpress.tenant.availability-zone=${EKS_DX_AVAILABILITY_ZONE:auto}

# Lambda Function URL timeout for SSE stream (15 min)
quarkus.lambda.timeout=900

quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG
