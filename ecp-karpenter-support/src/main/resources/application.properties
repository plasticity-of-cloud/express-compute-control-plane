quarkus.http.port=8080
quarkus.http.ssl-port=8443

# Health checks
quarkus.smallrye-health.root-path=/health

# TLS — cert-manager injects tls.crt / tls.key via Secret volume at /tls
quarkus.http.ssl.certificate.files=/tls/tls.crt
quarkus.http.ssl.certificate.key-files=/tls/tls.key

# Dev / test: plain HTTP only
%dev.quarkus.http.ssl.certificate.files=
%dev.quarkus.http.ssl.certificate.key-files=
%test.quarkus.http.ssl.certificate.files=
%test.quarkus.http.ssl.certificate.key-files=

# Container image — jib (cross-platform capable)
quarkus.container-image.registry=ghcr.io
quarkus.container-image.group=plasticity-of-cloud
quarkus.container-image.name=express-compute-karpenter-support
quarkus.container-image.tag=latest

# Kubernetes manifest generation
quarkus.kubernetes.namespace=kube-system
quarkus.kubernetes.service-type=ClusterIP
quarkus.kubernetes.replicas=1

# AWS SSM — sync client for AMI alias resolution
quarkus.ssm.aws.region=${AWS_REGION:us-east-1}
quarkus.ssm.sync-client.type=url
quarkus.kubernetes.liveness-probe.http-action-path=/health/live
quarkus.kubernetes.liveness-probe.initial-delay=2s
quarkus.kubernetes.liveness-probe.period=5s
quarkus.kubernetes.readiness-probe.http-action-path=/health/ready
quarkus.kubernetes.readiness-probe.initial-delay=1s
quarkus.kubernetes.readiness-probe.period=3s
quarkus.kubernetes.service-account=ecp-karpenter-support
quarkus.kubernetes.secret-volumes."tls-certs".secret-name=ecp-karpenter-support-tls
quarkus.kubernetes.secret-volumes."tls-certs".default-mode=0444
quarkus.kubernetes.mounts."tls-certs".path=/tls
quarkus.kubernetes.mounts."tls-certs".read-only=true

# Helm chart generation (quarkus-helm)
quarkus.helm.name=express-compute-karpenter-support
quarkus.helm.description=Karpenter EC2NodeClass webhook and ValidationSucceeded controller for EKS-D clusters
quarkus.helm.create-tar-file=true
quarkus.helm.notes=templates/NOTES.txt
# Explicitly map replicas to values.yaml so helm template uses {{ .Values.app.replicas }}
quarkus.helm.values.replicas.paths=(kind == Deployment).spec.replicas
quarkus.helm.values.replicas.value-as-int=1
# Wire clusterIdentity values into the ecp-config ConfigMap
quarkus.helm.expressions.0.path=(kind == ConfigMap && metadata.name == ecp-config).data.cluster-name
quarkus.helm.expressions.0.expression={{ .Values.clusterIdentity.clusterName | quote }}
quarkus.helm.expressions.1.path=(kind == ConfigMap && metadata.name == ecp-config).data.tenant-id
quarkus.helm.expressions.1.expression={{ .Values.clusterIdentity.tenantId | quote }}
quarkus.helm.expressions.2.path=(kind == ConfigMap && metadata.name == ecp-config).data.nat-gateway-enabled
quarkus.helm.expressions.2.expression={{ .Values.clusterIdentity.natGatewayEnabled | quote }}
quarkus.helm.expressions.3.path=(kind == ConfigMap && metadata.name == ecp-config).data.public-subnet-id
quarkus.helm.expressions.3.expression={{ .Values.clusterIdentity.publicSubnetId | quote }}
quarkus.helm.expressions.4.path=(kind == ConfigMap && metadata.name == ecp-config).data.private-subnet-id
quarkus.helm.expressions.4.expression={{ .Values.clusterIdentity.privateSubnetId | quote }}
quarkus.helm.expressions.5.path=(kind == ConfigMap && metadata.name == ecp-config).data.security-group-id
quarkus.helm.expressions.5.expression={{ .Values.clusterIdentity.securityGroupId | quote }}

