apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecp-workload-identity-webhook
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecp-workload-identity-webhook
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecp-workload-identity-webhook
subjects:
- kind: ServiceAccount
  name: ecp-workload-identity-webhook
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: ecp-workload-identity-webhook
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecp-workload-identity-webhook
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecp-workload-identity-webhook
  template:
    metadata:
      labels:
        app: ecp-workload-identity-webhook
    spec:
      serviceAccountName: ecp-workload-identity-webhook
      imagePullSecrets:
      - name: ecr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ecp-workload-identity-webhook
        image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/codriverlabs/ecp-workload-identity-webhook:latest
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: http
        env:
        - name: EKS_CLUSTER_NAME
          value: "ecp-control-plane-k3s"
        - name: ECP_ENDPOINT
          value: "https://iygc4hvpr2.execute-api.us-east-1.amazonaws.com/prod"
        volumeMounts:
        - name: tls-certs
          mountPath: /tls
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: tls-certs
        secret:
          secretName: ecp-workload-identity-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: ecp-workload-identity-webhook
  namespace: kube-system
spec:
  selector:
    app: ecp-workload-identity-webhook
  ports:
  - name: https
    port: 8443
    targetPort: 8443
