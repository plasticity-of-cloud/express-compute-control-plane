---
# Self-signed issuer (bootstraps the CA)
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-selfsigned
  namespace: kube-system
spec:
  selfSigned: {}
---
# CA certificate issued by the self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: kube-system
spec:
  isCA: true
  commonName: eks-pod-identity-webhook-ca
  secretName: eks-pod-identity-webhook-ca
  issuerRef:
    name: eks-pod-identity-webhook-selfsigned
    kind: Issuer
---
# CA-backed issuer used to sign the serving certificate
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: eks-pod-identity-webhook-ca
  namespace: kube-system
spec:
  ca:
    secretName: eks-pod-identity-webhook-ca
---
# Serving certificate for the webhook (injected into /tls by cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: eks-pod-identity-webhook-cert
  namespace: kube-system
spec:
  secretName: eks-pod-identity-webhook-tls
  issuerRef:
    name: eks-pod-identity-webhook-ca
    kind: Issuer
  dnsNames:
    - eks-pod-identity-webhook.kube-system.svc
    - eks-pod-identity-webhook.kube-system.svc.cluster.local
