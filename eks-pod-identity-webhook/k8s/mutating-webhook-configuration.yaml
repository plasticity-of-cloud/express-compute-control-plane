apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: eks-pod-identity-webhook
  annotations:
    cert-manager.io/inject-ca-from: kube-system/eks-pod-identity-webhook-cert
webhooks:
  - name: pod-identity.plasticity.cloud
    rules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE"]
        resources:   ["pods"]
        scope:       "Namespaced"
    clientConfig:
      service:
        namespace: kube-system
        name: eks-pod-identity-webhook
        path: /mutate
        port: 8443
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Ignore
