# HTTP server port — Lambda Web Adapter connects here
quarkus.http.port=${PORT:8080}

ecp.tenants-table=${ECP_TENANTS_TABLE:ecp-tenants}
ecp.clusters-table=${ECP_CLUSTERS_TABLE:ecp-clusters}
ecp.tenant.lt-arm64-ondemand=${ECP_LT_ARM64_ONDEMAND}
ecp.tenant.lt-arm64-spot=${ECP_LT_ARM64_SPOT}
ecp.tenant.lt-x86-ondemand=${ECP_LT_X86_ONDEMAND}
ecp.tenant.lt-x86-spot=${ECP_LT_X86_SPOT}
ecp.tenant.vpc-id=${ECP_VPC_ID}
ecp.tenant.availability-zone=${ECP_AVAILABILITY_ZONE:auto}

# KMS asymmetric key for signing tenant CA certificates
ecp.crypto.kms-ca-key-id=${ECP_KMS_CA_KEY_ID:}

quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG

# Dry-run mode: simulate provisioning SSE stream without creating resources
# Set ECP_DRY_RUN=true to enable
ecp.dry-run=${ECP_DRY_RUN:false}

# Deployment mode: self-managed | managed | hybrid (default)
ecp.deployment-mode=${ECP_DEPLOYMENT_MODE:hybrid}

# Package as uber-jar for Lambda Web Adapter deployment
quarkus.package.jar.type=uber-jar

# Quota — read from SSM at deploy via CDK, passed as env var
ecp.quota.max-tenants-per-caller=${ECP_MAX_TENANTS_PER_CALLER:1}
