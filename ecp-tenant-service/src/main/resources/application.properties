# HTTP server port — Lambda Web Adapter connects here
quarkus.http.port=${PORT:8080}

express-compute.tenants-table=${EXPRESS_COMPUTE_TENANTS_TABLE:express-compute-tenants}
express-compute.clusters-table=${EXPRESS_COMPUTE_CLUSTERS_TABLE:express-compute-clusters}
express-compute.tenant.lt-arm64-ondemand=${EXPRESS_COMPUTE_LT_ARM64_ONDEMAND}
express-compute.tenant.lt-arm64-spot=${EXPRESS_COMPUTE_LT_ARM64_SPOT}
express-compute.tenant.lt-x86-ondemand=${EXPRESS_COMPUTE_LT_X86_ONDEMAND}
express-compute.tenant.lt-x86-spot=${EXPRESS_COMPUTE_LT_X86_SPOT}
express-compute.tenant.vpc-id=${EXPRESS_COMPUTE_VPC_ID}
express-compute.tenant.availability-zone=${EXPRESS_COMPUTE_AVAILABILITY_ZONE:auto}

# KMS asymmetric key for signing tenant CA certificates
express-compute.crypto.kms-ca-key-id=${EXPRESS_COMPUTE_KMS_CA_KEY_ID:}

quarkus.log.level=INFO
quarkus.log.category."ai.codriverlabs".level=DEBUG

# Dry-run mode: simulate provisioning SSE stream without creating resources
# Set EXPRESS_COMPUTE_DRY_RUN=true to enable
express-compute.dry-run=${EXPRESS_COMPUTE_DRY_RUN:false}

# Deployment mode: self-managed | managed | hybrid (default)
express-compute.deployment-mode=${EXPRESS_COMPUTE_DEPLOYMENT_MODE:hybrid}

# Package as uber-jar for Lambda Web Adapter deployment
quarkus.package.jar.type=uber-jar

# Quota — read from SSM at deploy via CDK, passed as env var
express-compute.quota.max-tenants-per-caller=${EXPRESS_COMPUTE_MAX_TENANTS_PER_CALLER:1}
